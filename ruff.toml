line-length = 100

[lint]
# Stage 1: enforce core correctness/formatting; relax advanced rules for now.
select = ["E", "F", "I"]
ignore = ["E501"]

[lint.per-file-ignores]
"**/tests/*" = ["F401", "F841", "B007", "PLC0415", "C408", "C405", "SIM118"]
"**/migrations/*.py" = ["PLC0415", "TRY003"]
"manage.py" = ["TRY003", "PLC0415"]

[format]
quote-style = "double"
indent-style = "space"
