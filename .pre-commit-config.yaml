repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        name: bandit
        args:
          [
            "-r",
            ".",
            "-c",
            "bandit.yaml",
            "--severity-level",
            "medium",
            "--confidence-level",
            "medium",
          ]
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: ["--config-file", "mypy.ini"]
        additional_dependencies: [
          "django==5.1.15",
          "djangorestframework==3.15.2",
          "django-filter==24.3",
          "drf-spectacular==0.27.2",
          "django-stubs>=5.1.0",
          "django-stubs-ext>=5.1.0",
          "djangorestframework-stubs>=3.15.0",
          "types-python-dateutil==2.9.0.20241003"
        ]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: |
          (?x)^(pytest_report\.html)$
      - id: trailing-whitespace
        exclude: |
          (?x)^(pytest_report\.html)$
      - id: detect-private-key
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: detect secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            (.+/)?tests/.*|
            pytest_report\.html|
            static/.*|
            templates/.*
          )$
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python scripts/run_pytest_quiet.py
        language: python
        additional_dependencies:
          [
            "pytest==8.4.2",
            "pytest-django>=4,<5",
            "pytest-asyncio>=0.23,<0.24",
            "pytest-html>=4,<5",
            "pytest-randomly>=3.16,<4",
            "pytest-xdist>=3.8,<4",
            "Django==5.1.15",
            "djangorestframework==3.15.2",
            "django-filter==24.3",
            "drf-spectacular==0.27.2",
            "drf-spectacular-sidecar>=2024.7.1,<2025.0",
            "channels>=4.1,<5.0",
            "daphne>=4.1,<5.0",
            "redis>=5,<6",
            "freezegun>=1.5,<2",
            "Pillow>=10,<11",
            "argon2-cffi>=23.1.0",
          ]
        pass_filenames: false
        stages: [pre-commit]
