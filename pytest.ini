[pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev
python_files = tests.py test_*.py *_tests.py
addopts = -ra -vv --durations=10 --color=yes --cov=. --cov-config=.coveragerc --cov-report=term:skip-covered --cov-report=term-missing:skip-covered --cov-report=html --html=pytest_report.html --self-contained-html --cov-fail-under=86
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
console_output_style = progress
testpaths =
    accounts
    activity
    assignments
    config
    courses
    discussions
    materials
    messaging
    api
    ui
markers =
    ws: WebSocket-related tests
    security: Authentication/authorization/security tests
    performance: Query budget / performance tests
    slow: Longer-running tests (pagination matrices, budgets)
filterwarnings =
    ignore::django.utils.deprecation.RemovedInDjango60Warning
